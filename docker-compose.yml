# 基础设施服务 - PostgreSQL + Redis + MinIO
# 用法:  docker compose up -d
# 停止:  docker compose down
# 清数据: docker compose down -v

services:
  # =========================================
  # 1. PostgreSQL 16 + pgvector
  # =========================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: interview-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: interview_guide
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =========================================
  # 2. Redis 7
  # =========================================
  redis:
    image: redis:7
    container_name: interview-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # =========================================
  # 3. MinIO 对象存储 (S3 兼容)
  #   9000: API 端口    9001: 控制台端口
  # =========================================
  minio:
    image: minio/minio
    container_name: interview-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  # =========================================
  # 4. MinIO 初始化 - 自动创建 Bucket
  # =========================================
  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      set -eu;
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin &&
      (
        /usr/bin/mc ls myminio/interview-guide > /dev/null 2>&1 ||
        /usr/bin/mc mb myminio/interview-guide
      ) &&
      /usr/bin/mc anonymous set public myminio/interview-guide &&
      echo 'Bucket interview-guide created.' &&
      /usr/bin/mc ls myminio/interview-guide
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
